<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎬 Movirdre Search Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #f0f2f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a2e;
            --text-secondary: #3d3d5c;
            --text-muted: #6b6b8a;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.15);
            --glow: rgba(99, 102, 241, 0.20);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(26, 26, 46, 0.80);
            --bg-card-hover: rgba(40, 40, 70, 0.95);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0cc;
            --text-muted: #8080a0;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.40);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.60);
            --glow: rgba(99, 102, 241, 0.30);
            --input-bg: #1e1e36;
            --input-border: #3a3a5a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 60px;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* ===== ANIMATED BACKGROUND PARTICLES ===== */
        .bg-ornament {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-ornament span {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08), transparent 70%);
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .bg-ornament span:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            animation-duration: 25s;
        }
        .bg-ornament span:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.07), transparent 70%);
            animation-duration: 30s;
            animation-delay: 2s;
        }
        .bg-ornament span:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 60%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.05), transparent 70%);
            animation-duration: 22s;
            animation-delay: 4s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 50px) scale(0.95);
            }
            100% {
                transform: translate(30px, -10px) scale(1.02);
            }
        }

        /* ===== HEADER ===== */
        .app-header {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 820px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 2rem;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.25));
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            position: relative;
            width: 52px;
            height: 28px;
            border-radius: 50px;
            border: none;
            background: var(--bg-secondary);
            box-shadow: inset 0 0 0 1px var(--border-color), var(--shadow);
            cursor: pointer;
            transition: background var(--transition), box-shadow var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 3px;
        }

        .theme-toggle .toggle-track {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            font-size: 12px;
            color: var(--text-muted);
            transition: color var(--transition);
        }

        .theme-toggle .toggle-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);
            transition: transform var(--transition), background var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
        }

        [data-theme="dark"] .theme-toggle .toggle-thumb {
            transform: translateX(24px);
            background: #fbbf24;
            box-shadow: 0 2px 12px rgba(251, 191, 36, 0.35);
        }

        .theme-toggle .toggle-thumb i {
            font-size: 12px;
        }

        [data-theme="light"] .theme-toggle .toggle-thumb i {
            color: #fff;
        }

        /* ===== SEARCH SECTION ===== */
        .search-section {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 820px;
            margin-top: 4px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 6px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: box-shadow var(--transition), border-color var(--transition), background var(--transition);
            backdrop-filter: blur(4px);
        }

        .search-box:focus-within {
            box-shadow: 0 0 0 4px var(--glow), var(--shadow-hover);
            border-color: var(--accent);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: var(--font);
            color: var(--text-primary);
            outline: none;
            min-width: 0;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-box .search-btn {
            background: var(--accent);
            border: none;
            border-radius: calc(var(--radius) - 4px);
            padding: 14px 28px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
            white-space: nowrap;
        }

        .search-box .search-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.30);
        }

        .search-box .search-btn:active {
            transform: scale(0.97);
        }

        .search-box .search-btn i {
            font-size: 1rem;
        }

        /* ===== SEARCH TIPS ===== */
        .search-tips {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .search-tips i {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .search-tips kbd {
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: var(--font);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        /* ===== RESULTS ===== */
        .results-section {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 820px;
            margin-top: 28px;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .results-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-header h2 span {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.9rem;
        }

        .results-header .count-badge {
            background: var(--bg-secondary);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: var(--radius);
            padding: 16px 18px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.03), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .result-card:hover::before {
            opacity: 1;
        }

        .result-card .site-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .result-card .site-icon i {
            font-size: 1.1rem;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--accent);
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .result-card .site-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex: 1;
        }

        .result-card .site-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            word-break: break-all;
            padding: 6px 10px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: background var(--transition);
            position: relative;
            z-index: 1;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            line-height: 1.4;
            max-height: 60px;
            overflow-y: auto;
        }

        .result-card .site-url::-webkit-scrollbar {
            width: 3px;
        }
        .result-card .site-url::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .result-card .open-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            padding: 6px 14px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 500;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
            text-decoration: none;
            width: fit-content;
            position: relative;
            z-index: 1;
            font-family: var(--font);
        }

        .result-card .open-link:hover {
            background: var(--accent-hover);
            transform: scale(1.03);
        }

        .result-card .open-link:active {
            transform: scale(0.96);
        }

        .result-card .open-link i {
            font-size: 0.7rem;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state p {
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .empty-state .hint {
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0.6;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body {
                padding: 12px 12px 40px;
            }

            .logo-text {
                font-size: 1.2rem;
            }
            .logo-icon {
                font-size: 1.6rem;
            }

            .search-box {
                flex-direction: column;
                padding: 4px;
                gap: 8px;
            }

            .search-box input {
                padding: 12px 16px;
                font-size: 0.95rem;
            }

            .search-box .search-btn {
                padding: 12px 20px;
                justify-content: center;
                font-size: 0.9rem;
            }

            .results-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .result-card {
                padding: 14px 16px;
            }

            .results-header h2 {
                font-size: 0.95rem;
            }

            .theme-toggle {
                width: 46px;
                height: 24px;
            }
            .theme-toggle .toggle-thumb {
                width: 18px;
                height: 18px;
                top: 2px;
                left: 2px;
                font-size: 10px;
            }
            [data-theme="dark"] .theme-toggle .toggle-thumb {
                transform: translateX(22px);
            }

            .search-tips {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 400px) {
            .app-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-8 {
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- ===== BG ORNAMENTS ===== -->
    <div class="bg-ornament" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="logo-area">
            <span class="logo-icon">🎬</span>
            <span class="logo-text">MoviePortal</span>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span class="toggle-track">
                    <span style="display:flex;align-items:center;gap:2px;"><i class="fas fa-sun" style="font-size:11px;"></i></span>
                    <span style="display:flex;align-items:center;gap:2px;"><i class="fas fa-moon" style="font-size:11px;"></i></span>
                    <span class="toggle-thumb" id="toggleThumb">
                        <i class="fas fa-sun" id="thumbIcon"></i>
                    </span>
                </span>
            </button>
        </div>
    </header>

    <!-- ===== SEARCH ===== -->
    <section class="search-section">
        <div class="search-box">
            <input
            type="text"
            id="searchInput"
            placeholder="Search for any movie"
            autofocus
            aria-label="Movie search"
            />
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
        <div class="search-tips">
            <i class="fas fa-lightbulb"></i>
            Press <kbd>Enter</kbd> to search &nbsp;·&nbsp; Opens in new tabs
        </div>
    </section>

    <!-- ===== RESULTS ===== -->
    <section class="results-section" id="resultsSection">
        <div class="results-header">
            <h2 id="resultsTitle">
                <i class="fas fa-link" style="opacity:0.5;"></i>
                Search Results
                <span id="resultCount"></span>
            </h2>
            <span class="count-badge" id="countBadge">0 sites</span>
        </div>

        <!-- Results Grid -->
        <div class="results-grid" id="resultsGrid">
            <!-- populated by JS -->
        </div>

        <!-- Empty state (shown initially) -->
        <div class="empty-state" id="emptyState">
            <i class="fas fa-film"></i>
            <p>Type a movie name above and hit Search.<br />We'll find it across <strong>11</strong> websites.</p>
            <p class="hint">✨ Click any link to open in a new tab</p>
        </div>
    </section>

    <script>
        (function() {
            'use strict';

            // ===== DOM REFS =====
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsGrid = document.getElementById('resultsGrid');
            const emptyState = document.getElementById('emptyState');
            const resultCount = document.getElementById('resultCount');
            const countBadge = document.getElementById('countBadge');
            const resultsTitle = document.getElementById('resultsTitle');
            const themeToggle = document.getElementById('themeToggle');
            const toggleThumb = document.getElementById('toggleThumb');
            const thumbIcon = document.getElementById('thumbIcon');

            // ===== SITE LIST =====
            const sites = [{
                name: '4KHD Hub',
                icon: 'fa-solid fa-play',
                url: (q) => `https://4khdhub.one/?s=${q}`
            }, {
                name: 'FullRaces',
                icon: 'fa-solid fa-trophy',
                url: (q) => `https://fullraces.com/search/?q=${q}`
            }, {
                name: '5MovieRulz',
                icon: 'fa-solid fa-film',
                url: (q) => `https://www.5movierulz.support/search_movies?s=${q}`
            }, {
                name: 'Movies4U',
                icon: 'fa-solid fa-video',
                url: (q) => `https://movies4u.ss/?s=${q}`
            }, {
                name: 'Filmywap',
                icon: 'fa-solid fa-download',
                url: (q) => `https://www.filmywap.farm/mobile/search?find=${q}`
            }, {
                name: 'WorldFree4U (dog)',
                icon: 'fa-solid fa-globe',
                url: (q) => `https://worldfree4u.dog/?s=${q}`
            }, {
                name: 'WorldFree4U (video)',
                icon: 'fa-solid fa-globe',
                url: (q) => `https://worldfree4u.video/?s=${q}`
            }, {
                name: 'JustWatch (OTT)',
                icon: 'fa-solid fa-tv',
                url: (q) => `https://www.justwatch.com/in/search?q=${encodeURIComponent(q.replace(/\+/g, ' '))}`
            }, {
                name: 'Google',
                icon: 'fa-brands fa-google',
                url: (q) => `https://www.google.com/search?q=${q}+where+to+watch+online`
            }, {
                name: 'IMDb',
                icon: 'fa-brands fa-imdb',
                url: (q) => `https://www.imdb.com/find?q=${encodeURIComponent(q.replace(/\+/g, ' '))}`
            }, {
                name: 'TMDB',
                icon: 'fa-solid fa-clapperboard',
                url: (q) => `https://www.themoviedb.org/search?query=${q}`
            }];

            // ===== HELPERS =====
            function encodePlus(str) {
                // Replace spaces with '+' for URLs that expect that format
                return str.trim().replace(/\s+/g, '+');
            }

            function getQuery() {
                return searchInput.value.trim();
            }

            function buildResults(query) {
                if (!query) return [];

                const plusQuery = encodePlus(query);
                return sites.map(site => ({
                    name: site.name,
                    icon: site.icon,
                    url: site.url(plusQuery),
                    // store the raw query for display
                    displayQuery: query
                }));
            }

            // ===== RENDER =====
            function render(query) {
                const results = buildResults(query);

                // Clear grid
                resultsGrid.innerHTML = '';

                if (results.length === 0) {
                    emptyState.classList.remove('hidden');
                    resultsGrid.classList.add('hidden');
                    resultCount.textContent = '';
                    countBadge.textContent = '0 sites';
                    return;
                }

                emptyState.classList.add('hidden');
                resultsGrid.classList.remove('hidden');

                // Update count
                resultCount.textContent = `(${results.length})`;
                countBadge.textContent = `${results.length} sites`;

                // Build cards
                results.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.style.animationDelay = `${index * 40}ms`;

                    // Extract domain for display (clean up URL)
                    let displayUrl = item.url;
                    try {
                        const urlObj = new URL(item.url);
                        let host = urlObj.hostname;
                        if (host.startsWith('www.')) host = host.slice(4);
                        displayUrl = host + urlObj.pathname + urlObj.search;
                        if (displayUrl.length > 50) displayUrl = displayUrl.slice(0, 50) + '…';
                    } catch (_) { /* keep raw */ }

                    card.innerHTML = `
                            <div class="site-icon">
                                <i class="${item.icon}"></i>
                                <span class="site-name">${item.name}</span>
                            </div>
                            <div class="site-url" title="${item.url}">${displayUrl}</div>
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="open-link">
                                <i class="fas fa-external-link-alt"></i> Open
                            </a>
                        `;

                    resultsGrid.appendChild(card);
                });

                // Scroll to results on mobile after a tiny delay
                const resultsSection = document.getElementById('resultsSection');
                if (window.innerWidth < 640) {
                    setTimeout(() => {
                        resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 200);
                }
            }

            // ===== SEARCH ACTION =====
            function performSearch() {
                const query = getQuery();
                if (!query) {
                    // Focus input with a subtle shake
                    searchInput.style.borderColor = 'var(--accent)';
                    searchInput.focus();
                    setTimeout(() => {
                        searchInput.style.borderColor = '';
                    }, 600);
                    return;
                }
                render(query);
            }

            // ===== THEME =====
            function getPreferredTheme() {
                const stored = localStorage.getItem('movieportal-theme');
                if (stored === 'dark' || stored === 'light') return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('movieportal-theme', theme);

                // Update thumb icon
                if (theme === 'dark') {
                    thumbIcon.className = 'fas fa-moon';
                } else {
                    thumbIcon.className = 'fas fa-sun';
                }
            }

            function toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                setTheme(next);
            }

            // ===== INIT =====
            function init() {
                // Theme
                const initialTheme = getPreferredTheme();
                setTheme(initialTheme);

                // Event listeners
                searchBtn.addEventListener('click', performSearch);
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch();
                    }
                });
                themeToggle.addEventListener('click', toggleTheme);

                // Auto-search if URL has ?q=something
                const urlParams = new URLSearchParams(window.location.search);
                const queryParam = urlParams.get('q');
                if (queryParam) {
                    searchInput.value = queryParam;
                    performSearch();
                }

                // Focus input on load
                if (!queryParam) {
                    setTimeout(() => searchInput.focus(), 300);
                }
            }

            // ===== KEYBOARD SHORTCUT: Ctrl+K or Cmd+K =====
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                // Escape to clear
                if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    searchInput.blur();
                    // Optionally clear results? We'll keep them.
                }
            });

            // Run
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
